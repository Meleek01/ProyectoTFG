# 1. Conexión a tu MySQL Local
# Cambia 'nombre_tu_bd' por el nombre que quieras darle a tu esquema
spring.datasource.url=jdbc:mysql://localhost:3306/social_game_db
spring.datasource.username=root
spring.datasource.password=

# 2. Driver de MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Estrategia de creación de tablas (Crucial para empezar rápido)
# 'update' creará las tablas si no existen y las actualizará si ańades campos a tus clases
spring.jpa.hibernate.ddl-auto=update

# 4. Ver qué está pasando "bajo el capó" (útil para el proyecto de DAM)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 5. Puerto de la API (por defecto es 8080, puedes cambiarlo si quieres)
server.port=8080